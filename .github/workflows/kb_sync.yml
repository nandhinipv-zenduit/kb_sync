name: KB Sync

# Trigger via repository_dispatch with event_type 'kb_sync'
on:
  repository_dispatch:
    types: [kb_sync]

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: List repo files for debug (optional, can remove later)
      - name: List repository files
        run: ls -R

      # Step 3: Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 5: Run KB Sync Python script
      - name: Run KB Sync
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          PINECONE_KEY: ${{ secrets.PINECONE_KEY }}
          ZOHO_DESK_CLIENT_ID: ${{ secrets.ZOHO_DESK_CLIENT_ID }}
          ZOHO_DESK_CLIENT_SECRET: ${{ secrets.ZOHO_DESK_CLIENT_SECRET }}
          ZOHO_DESK_REFRESH_TOKEN: ${{ secrets.ZOHO_DESK_REFRESH_TOKEN }}
        run: |
          python main.py
