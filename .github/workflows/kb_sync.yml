name: KB Sync

on:
  # Manual trigger via repository_dispatch
  repository_dispatch:
    types: [kb_sync]

  # Scheduled triggers (1:15 AM & 1:15 PM EST)
  schedule:
    - cron: "15 6 * * *"   # 1:15 AM EST -> 06:15 UTC
    - cron: "15 18 * * *"  # 1:15 PM EST -> 18:15 UTC

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: List repo files for debug (optional)
      - name: List repository files
        run: ls -R

      # Step 3: Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 5: Run KB Sync Python script
      - name: Run KB Sync
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          PINECONE_KEY: ${{ secrets.PINECONE_KEY }}
          ZOHO_DESK_CLIENT_ID: ${{ secrets.ZOHO_DESK_CLIENT_ID }}
          ZOHO_DESK_CLIENT_SECRET: ${{ secrets.ZOHO_DESK_CLIENT_SECRET }}
          ZOHO_DESK_REFRESH_TOKEN: ${{ secrets.ZOHO_DESK_REFRESH_TOKEN }}
        run: |
          python main.py
